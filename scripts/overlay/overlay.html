<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1920px;height:1080px;overflow:hidden;background:#000;font-family:'Pretendard',-apple-system,sans-serif}
  #stage{position:absolute;inset:0;width:1920px;height:1080px;overflow:hidden}
  #bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  #grade{display:none}
  #scrim{position:absolute;inset:0;pointer-events:none}

  .panel{position:absolute}
  .pos-tl{left:120px;top:96px}.pos-tc{left:50%;top:96px;transform:translateX(-50%)}
  .pos-tr{right:120px;top:96px}.pos-cl{left:120px;top:50%;transform:translateY(-50%)}
  .pos-cc{left:50%;top:50%;transform:translate(-50%,-50%)}.pos-cr{right:120px;top:50%;transform:translateY(-50%)}
  .pos-bc{left:50%;bottom:240px;transform:translateX(-50%)}

  .glass{border-radius:26px;color:#fff;padding:46px 56px;background:rgba(13,15,21,.54);
    -webkit-backdrop-filter:blur(18px) saturate(1.18);backdrop-filter:blur(18px) saturate(1.18);
    border:1px solid rgba(255,255,255,.20);box-shadow:0 30px 82px rgba(0,0,0,.58),inset 0 1px 0 rgba(255,255,255,.12)}
  .glass.bare{background:transparent;border:none;box-shadow:none;-webkit-backdrop-filter:none;backdrop-filter:none;padding:20px 24px}
  .gi{animation:floaty 7s ease-in-out infinite}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  .in{animation:cardIn .55s cubic-bezier(.16,.84,.24,1) both}
  @keyframes cardIn{from{opacity:0;transform:translateY(26px) scale(.97)}to{opacity:1;transform:none}}
  .ts{text-shadow:0 4px 22px rgba(0,0,0,.6)}
  .accent{color:var(--ac)}
  .cap{font-size:32px;font-weight:600;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:13px;margin-bottom:12px}
  .cap .dot{width:11px;height:11px;border-radius:50%;background:var(--ac);animation:dotglow 2.6s ease-in-out infinite}
  @keyframes dotglow{0%,100%{box-shadow:0 0 12px 2px var(--ac);opacity:.85}50%{box-shadow:0 0 24px 7px var(--ac);opacity:1}}
  .unit{font-size:24px;color:rgba(255,255,255,.6);font-weight:500}

  .num{font-weight:800;line-height:1;letter-spacing:-.02em}
  .num.std{font-size:158px}.num.hero{font-size:300px;animation:herobreath 4.5s ease-in-out infinite,heroglow 4.5s ease-in-out infinite}
  @keyframes herobreath{0%,100%{transform:scale(1)}50%{transform:scale(1.018)}}
  @keyframes heroglow{0%,100%{text-shadow:0 6px 26px rgba(0,0,0,.6),0 0 34px var(--ac)}50%{text-shadow:0 6px 26px rgba(0,0,0,.6),0 0 74px var(--ac)}}
  .num.std .accent{animation:pulse 3.6s ease-in-out infinite,numglow 3.6s ease-in-out infinite}
  @keyframes numglow{0%,100%{text-shadow:0 4px 22px rgba(0,0,0,.6),0 0 20px var(--ac)}50%{text-shadow:0 4px 22px rgba(0,0,0,.6),0 0 44px var(--ac)}}
  .lab{font-weight:500;color:rgba(255,255,255,.9);margin-top:14px}.lab.std{font-size:36px}.lab.hero{font-size:52px}
  .pulse{animation:pulse 3.6s ease-in-out infinite;transform-origin:left center;display:inline-block}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.025)}}

  .chg{display:flex;align-items:flex-end;gap:20px}
  .chg .old{font-size:64px;font-weight:700;color:rgba(255,255,255,.55);text-decoration:line-through;text-decoration-thickness:3px}
  .chg .arr{font-size:56px;font-weight:800;color:var(--ac);animation:bob 1.8s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .chg .new{font-size:108px;font-weight:800;line-height:1}.chg .pct{font-size:46px;font-weight:800;color:var(--ac)}

  .vs{display:flex;align-items:center;gap:56px}.vs .side{text-align:center}
  .vs .side .v{font-size:128px;font-weight:800;line-height:1}.vs .side .v small{font-size:42px}
  .vs .side .n{font-size:32px;font-weight:600;color:rgba(255,255,255,.85);margin-top:12px}
  .vs .mid{font-size:46px;font-weight:800;border:3px solid rgba(255,255,255,.55);border-radius:50%;width:108px;height:108px;display:flex;align-items:center;justify-content:center;flex-shrink:0;animation:vsbeat 3.4s ease-in-out infinite}
  @keyframes vsbeat{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

  .bars{display:flex;flex-direction:column;gap:24px;margin-top:22px;width:780px}
  .bar-row{display:flex;align-items:center;gap:20px}
  .bar-name{width:180px;font-size:34px;font-weight:600;text-align:right;color:rgba(255,255,255,.92)}
  .bar-track{flex:1;height:52px;background:rgba(255,255,255,.10);border-radius:13px;overflow:hidden}
  .bar-fill{height:100%;width:0;border-radius:11px;position:relative;overflow:hidden}
  .bar-fill.hl{background:linear-gradient(90deg,#ff9e00,var(--ac))}.bar-fill.dim{background:rgba(255,255,255,.45)}
  .bar-fill::after{content:'';position:absolute;top:0;bottom:0;left:-45%;width:35%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:sheen 3.2s ease-in-out infinite}
  @keyframes sheen{0%{left:-45%}55%,100%{left:135%}}
  .bar-val{width:160px;font-size:36px;font-weight:800}

  .donut-wrap{display:flex;align-items:center;gap:52px;margin-top:14px}
  .donut{position:relative;width:230px;height:230px;transform:scale(1.2);transform-origin:left center;margin-right:26px}.donut svg{transform:rotate(-90deg)}
  .ring-bg{fill:none;stroke:rgba(255,255,255,.14);stroke-width:30}
  .ring-fg{fill:none;stroke:var(--ac);stroke-width:30;stroke-linecap:round;stroke-dasharray:565;stroke-dashoffset:565}
  .donut .spin{position:absolute;inset:5px;animation:spin 6s linear infinite}
  .donut .spin::before{content:'';position:absolute;left:50%;top:-3px;width:16px;height:16px;margin-left:-8px;border-radius:50%;background:#fff;box-shadow:0 0 12px 4px var(--ac)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .donut .ctr{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .donut .ctr .v{font-size:68px;font-weight:800;color:var(--ac)}
  .leg .t{font-size:38px;font-weight:800}.leg .sub{font-size:24px;color:rgba(255,255,255,.75);font-weight:500;margin-top:6px}

  .tl{display:flex;align-items:flex-start;margin-top:26px;position:relative}
  .tl .base{position:absolute;left:15px;right:140px;top:14px;height:3px;background:rgba(255,255,255,.28)}
  .tl .run{position:absolute;top:7px;left:6px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 0 16px 5px var(--ac);animation:tlrun 4.6s ease-in-out infinite}
  @keyframes tlrun{0%{left:6px;opacity:0}10%{opacity:1}88%{opacity:1}100%{left:460px;opacity:0}}
  .tl .ev{width:200px;position:relative}
  .tl .ev .pt{width:30px;height:30px;border-radius:50%;background:var(--ac);box-shadow:0 0 18px 4px var(--ac);position:relative;z-index:2}
  .tl .ev .yr{font-size:40px;font-weight:800;margin-top:16px}.tl .ev .lb{font-size:24px;font-weight:500;color:rgba(255,255,255,.85);margin-top:5px;line-height:1.3;padding-right:14px}

  .rank{display:flex;flex-direction:column;gap:17px;margin-top:20px;width:660px}
  .rk{display:flex;align-items:center;gap:22px;padding:11px 16px;border-radius:14px}
  .rk.first{background:rgba(255,255,255,.10);animation:rkglow 3s ease-in-out infinite}
  @keyframes rkglow{0%,100%{box-shadow:0 0 0 transparent}50%{box-shadow:0 0 28px rgba(255,183,3,.4)}}
  .rk .no{width:60px;height:60px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;color:#15161a;background:rgba(255,255,255,.6)}
  .rk.first .no{background:var(--ac)}.rk .nm{flex:1;font-size:42px;font-weight:700}.rk .vl{font-size:38px;font-weight:800;color:rgba(255,255,255,.92)}

  .route{margin-top:14px;width:580px}.route .line{position:relative;height:80px}
  .route svg{position:absolute;inset:0;width:100%;height:100%}
  .route .dash{stroke:var(--ac);stroke-width:4;stroke-dasharray:14 12;fill:none;opacity:.85;animation:flow 2.2s linear infinite}
  @keyframes flow{to{stroke-dashoffset:-52}}
  .route .ends{display:flex;justify-content:space-between;margin-top:8px}.route .ends span{font-size:32px;font-weight:700}
  .route .cap2{font-size:30px;font-weight:600;margin-top:16px}.route .cap2 b{color:var(--ac);font-size:42px}

  .headline{font-size:94px;font-weight:800;line-height:1.16;letter-spacing:-.01em;max-width:1200px}
  .headline .hl{position:relative;color:var(--ac);white-space:nowrap;animation:hlglow 3s ease-in-out infinite}
  @keyframes hlglow{0%,100%{text-shadow:none}50%{text-shadow:0 0 24px var(--ac)}}

  .quote{max-width:820px}.quote .mk{font-size:130px;line-height:.5;color:var(--ac);font-weight:800;height:54px;display:block}
  .quote .q{font-size:52px;font-weight:600;line-height:1.42;margin:10px 0 18px}.quote .by{font-size:30px;font-weight:600;color:rgba(255,255,255,.82)}.quote .by b{color:var(--ac)}

  .nametag{display:flex;align-items:stretch;gap:20px}
  .nametag .barL{width:9px;background:var(--ac);border-radius:6px;box-shadow:0 0 16px 2px var(--ac);animation:barpulse 2.8s ease-in-out infinite}
  @keyframes barpulse{0%,100%{box-shadow:0 0 10px 1px var(--ac)}50%{box-shadow:0 0 22px 5px var(--ac)}}
  .nametag .nm{font-size:54px;font-weight:800;line-height:1.05}.nametag .ti{font-size:30px;font-weight:600;color:rgba(255,255,255,.82);margin-top:6px}

  .blist{list-style:none;display:flex;flex-direction:column;gap:20px;margin-top:14px;width:720px}
  .blist li{display:flex;align-items:flex-start;gap:18px;font-size:38px;font-weight:600;animation:bIn 1s cubic-bezier(.22,.7,.2,1) both}
  .blist li .bd{width:18px;height:18px;border-radius:50%;background:var(--ac);margin-top:13px;flex-shrink:0;box-shadow:0 0 14px 2px var(--ac)}
  .blist li b{color:var(--ac)}
  @keyframes bIn{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:none}}
</style></head>
<body>
  <div id="stage"><img id="bg"><div id="grade"></div><div id="scrim"></div></div>
<script>
  var AC={red:'#ff5a5a',amber:'#ffb703',green:'#34d399',cyan:'#38d9e0',gold:'#ffd166'};
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function digits(s){var m=String(s).replace(/,/g,'').match(/\d+(?:\.\d+)?/);return m?parseFloat(m[0]):0;}

  // 타입별 내부 HTML 생성
  var R={
    single_stat_card:function(d){return '<div class="cap ts"><span class="dot"></span>'+esc(d.label||'')+'</div>'+
      '<div class="num std ts"><span class="accent pulse">'+esc(prefixOf(d.value))+'<span class="cnt" data-to="'+digits(d.value)+'" data-suffix="'+esc(suffixOf(d.value))+'">0</span></span></div>';},
    hero_stat:function(d){return '<div class="cap ts"><span class="dot"></span>'+esc(d.cap||d.label||'')+'</div>'+
      '<div class="num hero accent ts">'+prefixOf(d.value)+'<span class="cnt" data-to="'+digits(d.value)+'" data-suffix="'+esc(suffixOf(d.value))+'">0</span></div>'+
      (d.sub?'<div class="lab hero ts">'+esc(d.sub)+'</div>':'');},
    stat_change:function(d){return '<div class="cap ts"><span class="dot"></span>'+esc(d.label||'')+'</div>'+
      '<div class="chg ts"><span class="old">'+esc(d.from)+'</span><span class="arr">'+((d.dir==='down')?'▼':'▲')+'</span>'+
      '<span class="new accent">'+esc(d.to)+'</span>'+(d.pct?'<span class="pct">'+esc(d.pct)+'</span>':'')+'</div>';},
    versus:function(d){var L=d.left||{},Rt=d.right||{};return '<div class="cap ts" style="justify-content:center"><span class="dot" style="background:#fff;animation:none;box-shadow:none"></span>'+esc(d.label||'')+'</div>'+
      '<div class="vs"><div class="side"><div class="v" style="color:#fff">'+esc(L.value)+'</div><div class="n">'+esc(L.label)+'</div></div>'+
      '<div class="mid accent">VS</div><div class="side"><div class="v accent">'+esc(Rt.value)+'</div><div class="n">'+esc(Rt.label)+'</div></div></div>';},
    bar_chart:function(d){var items=d.items||[];var mx=Math.max.apply(null,items.map(function(i){return digits(i.value)}).concat([1]));
      var rows=items.map(function(it,i){var w=Math.round(digits(it.value)/mx*100);var hl=(it.highlight||i===0);
        return '<div class="bar-row"><div class="bar-name">'+esc(it.name)+'</div><div class="bar-track"><div class="bar-fill '+(hl?'hl':'dim')+'" data-w="'+w+'"></div></div><div class="bar-val '+(hl?'accent':'')+'">'+esc(it.value)+'</div></div>';}).join('');
      return '<div class="cap ts"><span class="dot"></span>'+esc(d.title||'')+(d.unit?' <span class="unit">('+esc(d.unit)+')</span>':'')+'</div><div class="bars">'+rows+'</div>';},
    donut:function(d){var pct=digits(d.value);return '<div class="cap ts"><span class="dot"></span>'+esc(d.label||'')+'</div>'+
      '<div class="donut-wrap"><div class="donut"><svg width="230" height="230"><circle class="ring-bg" cx="115" cy="115" r="90"/><circle class="ring-fg" cx="115" cy="115" r="90" data-pct="'+pct+'"/></svg><div class="spin"></div><div class="ctr"><div class="v"><span class="cnt" data-to="'+pct+'" data-suffix="%">0</span></div></div></div>'+
      (d.legend?'<div class="leg"><div class="t accent">'+esc(d.legend)+'</div>'+(d.rest?'<div class="sub">'+esc(d.rest)+'</div>':'')+'</div>':'')+'</div>';},
    ranking:function(d){var items=d.items||[];var rows=items.map(function(it,i){return '<div class="rk'+(i===0?' first':'')+'"><div class="no">'+esc(it.rank||(i+1))+'</div><div class="nm">'+esc(it.name)+'</div>'+(it.value?'<div class="vl '+(i===0?'accent':'')+'">'+esc(it.value)+'</div>':'')+'</div>';}).join('');
      return '<div class="cap ts"><span class="dot"></span>'+esc(d.title||'')+(d.unit?' <span class="unit">('+esc(d.unit)+')</span>':'')+'</div><div class="rank">'+rows+'</div>';},
    timeline:function(d){var ev=d.events||[];var cells=ev.map(function(e){return '<div class="ev"><div class="pt"></div><div class="yr">'+esc(e.year)+'</div><div class="lb">'+esc(e.label)+'</div></div>';}).join('');
      return '<div class="cap ts" style="justify-content:center"><span class="dot"></span>'+esc(d.title||'')+'</div><div class="tl"><div class="base"></div><div class="run"></div>'+cells+'</div>';},
    route:function(d){return '<div class="cap ts"><span class="dot"></span>'+esc(d.label||'수송로')+'</div>'+
      '<div class="route"><div class="line"><svg viewBox="0 0 580 80" preserveAspectRatio="none"><path class="dash" d="M30,40 C210,8 380,72 550,40"/><circle cx="30" cy="40" r="12" fill="var(--ac)"/><circle cx="550" cy="40" r="12" fill="#fff"/><circle r="10" fill="#fff"><animate attributeName="cx" values="30;550" dur="3.2s" repeatCount="indefinite"/><animate attributeName="cy" values="40;14;40;66;40" dur="3.2s" repeatCount="indefinite"/></circle></svg></div>'+
      '<div class="ends"><span class="accent">'+esc(d.from)+'</span><span>'+esc(d.to)+'</span></div>'+(d.caption?'<div class="cap2">'+esc(d.caption)+'</div>':'')+'</div>';},
    headline:function(d){var t=esc(d.text||'');if(d.highlight){t=t.replace(esc(d.highlight),'<span class="hl">'+esc(d.highlight)+'</span>');}return '<div class="headline ts">'+t+'</div>';},
    quote:function(d){return '<div class="quote"><span class="mk">“</span><div class="q ts">'+esc(d.quote)+'</div><div class="by">— <b>'+esc(d.by)+'</b></div></div>';},
    nametag:function(d){return '<div class="nametag"><div class="barL"></div><div><div class="nm ts">'+esc(d.name)+'</div><div class="ti">'+esc(d.title)+'</div></div></div>';},
    bullets:function(d){var items=d.items||[];var lis=items.map(function(it,i){return '<li style="animation-delay:'+(0.5+i*0.4)+'s"><span class="bd"></span><div>'+esc(it)+'</div></li>';}).join('');
      return '<div class="cap ts"><span class="dot"></span>'+esc(d.title||'')+'</div><ul class="blist">'+lis+'</ul>';}
  };
  function suffixOf(v){var s=String(v==null?'':v);var m=s.match(/[^\d.,\s]+$/);return m?m[0]:'';}
  function prefixOf(v){var s=String(v==null?'':v);var m=s.match(/^[^\d.,]+/);return m?m[0]:'';}

  function render(OV){
    document.getElementById('bg').src=OV.image||'';
    var ac=AC[OV.accent]||OV.accent||AC.amber;
    var bareTypes={hero_stat:1,headline:1};
    var inner=(R[OV.type]||function(){return '<div class="cap">알수없는 타입</div>'})(OV.data||{});
    var bare=bareTypes[OV.type]?' bare':'';
    var posstyle='';
    if(OV.type==='nametag'){posstyle='top:auto;bottom:240px;transform:none;';}
    var html='<div class="panel pos-'+(OV.position||'tl')+'" style="--ac:'+ac+';'+posstyle+'"><div class="glass'+bare+' in"><div class="gi">'+inner+'</div></div></div>';
    // 스크림 (글자 가독성) — 카드 위치 따라 그 자리 배경을 어둡게
    var SCRIM={tl:'18% 30%',tc:'50% 24%',tr:'82% 30%',cl:'20% 50%',cc:'50% 50%',cr:'80% 50%',bc:'50% 76%'};
    var spos=SCRIM[OV.position||'tl']||'30% 42%';
    if(OV.type==='nametag')spos='20% 80%';
    document.getElementById('scrim').style.background='radial-gradient(130% 108% at '+spos+',rgba(0,0,0,.66),rgba(0,0,0,0) 56%)';
    var old=document.querySelector('.panel');if(old)old.remove();
    document.getElementById('stage').insertAdjacentHTML('beforeend',html);
    document.documentElement.style.setProperty('--ac',ac);
    window.__dur=(OV.duration||8)*1000;
  }

  // ===== 결정적 seek (프레임 캡처용) =====
  function applyState(t){
    // 켄번즈 제거 — 배경 정지(줌/팬은 캡컷에서 처리)
    // 카운트업
    document.querySelectorAll('.cnt').forEach(function(c){
      var to=parseFloat(c.dataset.to||'0'),suf=c.dataset.suffix||'',start=450,dur=1300;
      var p=Math.max(0,Math.min(1,(t-start)/dur));var e=1-Math.pow(1-p,3);
      var dec=(String(to).indexOf('.')>=0);var v=to*e;
      c.textContent=(dec?v.toFixed(1):Math.round(v).toLocaleString())+suf;
    });
    // 막대
    document.querySelectorAll('.bar-fill').forEach(function(b,i){
      var w=parseFloat(b.dataset.w||'0'),start=520+i*200,dur=1100;
      var p=Math.max(0,Math.min(1,(t-start)/dur));var e=1-Math.pow(1-p,3);
      b.style.width=(w*e)+'%';
    });
    // 도넛
    document.querySelectorAll('.ring-fg').forEach(function(r){
      var pct=parseFloat(r.dataset.pct||'0'),start=500,dur=1250;
      var p=Math.max(0,Math.min(1,(t-start)/dur));var e=1-Math.pow(1-p,3);
      r.style.strokeDashoffset=(565*(1-pct/100*e)).toFixed(1);
    });
  }
  function seek(t){
    try{document.getAnimations().forEach(function(a){a.pause();try{a.currentTime=t;}catch(e){}});}catch(e){}
    document.querySelectorAll('svg').forEach(function(s){try{s.pauseAnimations();s.setCurrentTime(t/1000);}catch(e){}});
    applyState(t);
  }
  window.render=render;window.seek=seek;
  // 자동 데모(직접 열었을 때): window.OV 있으면 렌더 후 재생
  if(window.OV){render(window.OV);var t0=null;function loop(ts){if(!t0)t0=ts;var t=ts-t0;applyState(t);requestAnimationFrame(loop);}requestAnimationFrame(loop);}
</script>
</body></html>
