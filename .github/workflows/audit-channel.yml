name: Audit Channel

on:
  workflow_dispatch:  # 수동 실행 전용 — 채널 조회수 진단 데이터 수집

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Audit channel
        env:
          YOUTUBE_API_KEY: ${{ secrets.YT_KEYS }}
        run: python scripts/audit_channel.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/economy/channel_audit.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: channel_audit.json 수집 [skip ci]"
            git pull --rebase
            git push
          fi
