name: Discover History Channels

on:
  workflow_dispatch:  # 수동 실행 전용 — 역사 채널 발굴 스윕 (약 3,400유닛)

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Discover and register history channels
        env:
          YOUTUBE_API_KEY: ${{ secrets.YT_KEYS }}
        run: python scripts/discover_history.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add channels.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "feat: 역사 채널 자동 발굴 등록 [skip ci]"
            git pull --rebase
            git push
          fi
