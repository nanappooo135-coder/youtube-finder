name: Daily Briefing

on:
  schedule:
    # 매일 06:30 KST (= 21:30 UTC) — 아침에 열면 차려져 있게
    - cron: '30 21 * * *'
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install kiwipiepy (제목 형태소 분석 — 파도 클러스터링)
        run: pip install kiwipiepy

      - name: Scan channels and build briefing
        env:
          YOUTUBE_API_KEY: ${{ secrets.YT_KEYS }}
        run: python scripts/daily_briefing.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add briefing.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update briefing.json [skip ci]"
            git pull --rebase
            git push
          fi
